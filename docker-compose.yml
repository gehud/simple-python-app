services:
  app:
    build: .
    container_name: simple-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 5s
    restart: unless-stopped
